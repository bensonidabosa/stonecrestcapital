<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
    }

    .image {
      position: relative;
    }

    /* image */
    .image img {
      width: 100%;
      display: block;

      /* fade right + bottom */
      mask-image:
        linear-gradient(to right, black 65%, transparent),
        linear-gradient(to bottom, black 75%, transparent);

      mask-composite: intersect;
      -webkit-mask-composite: destination-in;
    }

    /* green overlay */
    .image::after {
      content: "";
      position: absolute;
      inset: 0;

      /* background:radial-gradient(
    circle at 35% 50%,
    rgba(0,255,170,0.45),
    transparent 50%
  ); */

      /* background:rgba(0,150,90,0.14);  */
      mix-blend-mode: multiply;

      pointer-events: none;
    }

    .image::before {
      content: "";
      position: absolute;
      inset: 0;

      background: radial-gradient(circle at 35% 50%,
          rgba(0, 255, 170, 0.25),
          transparent 60%);

      filter: blur(25px);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="image">
      <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31" alt="">
    </div>

    <div class="content">
      <h3>Data Fortress</h3>
      <p>AI Infrastructure</p>
    </div>
  </div>
</body>

</html>
