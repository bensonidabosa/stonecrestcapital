<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<title>REIT Card</title>

<style>
    body{
background:#eef1ef;
font-family: Inter, system-ui;
color:#1f2a27;
}

.subtitle{
color:#7a8680;
margin-bottom:30px;
}

/* outer container */

.reit-wrapper{
background:#f6f8f7;
padding:18px;
border-radius:22px;

box-shadow:
0 10px 30px rgba(0,0,0,0.06),
inset 0 1px 0 rgba(255,255,255,0.8);
}

/* card */

.reit-card{
background:white;
border-radius:18px;
padding:30px;

border:1px solid #e7ecea;

box-shadow:
0 20px 40px rgba(0,0,0,0.08);
}

/* title */

.title{
font-weight:700;
margin-bottom:4px;
}

.subtitle-small{
color:#7b8882;
font-weight:500;
margin-bottom:10px;
}

/* description */

.desc{
color:#6f7c76;
font-size:14px;
margin-bottom:18px;
}

/* divider */

hr{
border-color:#e6ebe8;
opacity:1;
}

/* glowing image */

.image-glow{
position:relative;
display:inline-block;
}

.image-glow::before{
content:"";
position:absolute;
inset:-20px;
background:radial-gradient(circle, rgba(44,143,100,0.35), transparent 70%);
filter:blur(20px);
z-index:-1;
}

/* button */

.activate-btn{
width:100%;
border:none;

padding:14px 20px;

border-radius:40px;

font-weight:600;
font-size:16px;

color:white;

background:linear-gradient(180deg,#2c8f64,#155a40);

box-shadow:
0 6px 10px rgba(0,0,0,0.2),
inset 0 1px 0 rgba(255,255,255,0.25);

transition:0.2s;
}

.activate-btn:hover{
transform:translateY(-1px);
background:linear-gradient(180deg,#36a875,#196a4b);
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  width:350px;
}

.image-wrap{
  position:relative;
}

.image-wrap img{
  width:100%;
  display:block;
  mask-image: linear-gradient(to bottom, black 70%, transparent);
}


/* fog fade */
.image-wrap::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:45%;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0),
    rgba(255,255,255,0.8),
    white
  );

  filter:blur(8px);
}

.image-wrap::before{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;

  background:radial-gradient(
    ellipse at center,
    rgba(255,255,255,0.6),
    transparent
  );
}

.image-wrap{
  position:relative;
}

.image-wrap::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    linear-gradient(to bottom, transparent 60%, white),
    linear-gradient(to right, transparent 60%, white);
}
</style>
</head>

<body>

<div class="container py-5">

<h2 class="fw-bold">Real Estate Trust (REIT) Mandates</h2>

<p class="subtitle">
Conservative growth focused on tangible asset security and foundational stability.
</p>

<div class="reit-wrapper">

<div class="reit-card">

<div class="row align-items-center g-4">

<div class="col-md-5 text-center">

<div class="image-glow">
<img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31" class="img-fluid">
</div>

</div>

<div class="col-md-7">

<h3 class="title">
Data Fortress
</h3>

<h5 class="subtitle-small">(AI Infrastructure)</h5>

<hr>

<p class="desc">
Focus: Hyperscale Data Center real estate for Tier-1 Tech providers.
</p>

<p class="mb-1"><b>Yield:</b> 6.8%</p>
<p class="mb-3"><b>Requirement:</b> $25,000.00</p>

<button class="activate-btn">
Activate Strategy
</button>



</div>

</div>

</div>
</div>

</div>

<div class="card">
  <div class="image-wrap">
    <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31">
  </div>

  <div class="content">
    <h3>Data Fortress</h3>
    <p>AI Infrastructure</p>
  </div>
</div>
</body>
</html>
